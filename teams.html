<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Uczestnicy Sezonu 1 | Common Ground League</title>
    <link rel="stylesheet" href="global.css">
    <link rel="stylesheet" href="teams.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body>
    <nav class="navbar">
        <a href="index.html"><img src="logoliga.jpg" alt="Logo CGL" class="nav-logo"></a>
        <ul class="nav-links">
            <li><a href="index.html">Start</a></li>
            <li><a href="faq.html">FAQ</a></li>
            <li><a href="teams.html" class="active">Drużyny</a></li>
            <li><a href="my-team.html">Mój zespół</a></li>
            <li id="user-display">
                <a href="login.html" class="nav-btn">Zaloguj się</a>
            </li>
        </ul>
    </nav>

    <main class="teams-container">
        <header class="section-header">
            <h2 class="badge">ZAAKCEPTOWANE EKIPY</h2>
            <h1>Uczestnicy <span>Sezonu 1</span></h1>
            <p>Poniżej znajdziesz listę oficjalnie potwierdzonych drużyn biorących udział w rozgrywkach Common Ground League.</p>
        </header>

        <div id="teams-grid" class="teams-grid">
            <div class="loader">Łączenie z bazą danych...</div>
        </div>
    </main>

    <footer class="main-footer">
        <div class="footer-bottom">
            &copy; 2026 Common Ground League. Wszystkie prawa zastrzeżone.
        </div>
    </footer>

    <script>
        // TWÓJ AKTUALNY LINK WEB APP (Z AKCJĄ GETALL)
        const API_URL = 'https://script.google.com/macros/s/AKfycbzVAWDSMcgAhBZPiDurzNJtCju7HsfuFKgxduVMbjMYT25PG6a1IZ8QVOfqaryiGR4K/exec?action=getAll';

        async function fetchTeams() {
            const grid = document.getElementById('teams-grid');
            
            try {
                const response = await fetch(API_URL);
                const teams = await response.json();

                // Czyścimy loader/komunikaty
                grid.innerHTML = '';

                // FILTR: Pokazujemy tylko te drużyny, które mają status dokładnie "active"
                const activeTeams = teams.filter(team => 
                    team.status && team.status.toLowerCase() === 'active'
                );

                if (activeTeams.length === 0) {
                    grid.innerHTML = `
                        <div class="empty-msg" style="grid-column: 1/-1; text-align: center; padding: 50px; color: #555;">
                            Obecnie brak zweryfikowanych drużyn. <br>
                            <small>Zapisz swoją ekipę w panelu i czekaj na akceptację admina!</small>
                        </div>`;
                    return;
                }

                // Generowanie kafelków dla zaakceptowanych drużyn
                activeTeams.forEach(team => {
                    const card = document.createElement('div');
                    card.className = 'team-card';

                    card.innerHTML = `
                        <div class="team-badge status-verified">AKTYWNA</div>
                        <div class="team-logo-box">
                            <img src="${team.logo || 'default-logo.png'}" alt="Logo ${team.teamName}" onerror="this.src='default-logo.png'">
                        </div>
                        <div class="team-details">
                            <h3>${team.teamName} <span class="tag">[${team.teamTag}]</span></h3>
                            <div class="team-meta">
                                <span><strong>Kapitan:</strong> ${team.captain}</span>
                            </div>
                        </div>
                    `;
                    grid.appendChild(card);
                });

            } catch (error) {
                console.error("Błąd pobierania danych:", error);
                grid.innerHTML = '<div class="error-msg">Błąd podczas pobierania uczestników. Odśwież stronę (Ctrl+F5).</div>';
            }
        }

        // Obsługa profilu użytkownika w nawigacji
        function setupNavbar() {
            const user = JSON.parse(localStorage.getItem('cgl_user'));
            const userDisplay = document.getElementById('user-display');
            
            if (user && userDisplay) {
                const avatar = user.avatar 
                    ? `https://cdn.discordapp.com/avatars/${user.id}/${user.avatar}.png` 
                    : 'https://cdn.discordapp.com/embed/avatars/0.png';
                
                userDisplay.innerHTML = `
                    <div class="user-pill" onclick="window.location.href='dashboard.html'" style="cursor:pointer;">
                        <img src="${avatar}" class="user-nav-avatar" style="width:30px; border-radius:50%; margin-right:10px;">
                        <span class="user-nav-nick" style="font-weight:bold; color:#00ff88;">${user.username}</span>
                    </div>
                `;
            }
        }

        // Inicjalizacja
        document.addEventListener('DOMContentLoaded', () => {
            setupNavbar();
            fetchTeams();
        });
    </script>
</body>
</html>
