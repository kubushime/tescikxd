<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logowanie | Common Ground League</title>
    <link rel="stylesheet" href="global.css">
    <link rel="stylesheet" href="login.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body class="login-page">

    <div class="login-container">
        <div class="login-card">
            <img src="logoliga.jpg" alt="Logo CGL" class="login-logo">
            <h1>Witaj w <span>CGL</span></h1>
            <p>Zaloguj się przez Discord, aby uzyskać dostęp do panelu gracza i Twojej drużyny.</p>
            
            <button onclick="authDiscord()" class="discord-auth-btn">
                <svg width="20" height="20" fill="currentColor" viewBox="0 0 24 24">
                    <path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0a12.64 12.64 0 0 0-.617-1.25a.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 0 0 .031.057a19.9 19.9 0 0 0 5.993 3.03a.078.078 0 0 0 .084-.028a14.09 14.09 0 0 0 1.226-1.994a.076.076 0 0 0-.041-.106a13.107 13.107 0 0 1-1.872-.892a.077.077 0 0 1-.008-.128a10.2 10.2 0 0 0 .372-.292a.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127a12.299 12.299 0 0 1-1.873.892a.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028a19.839 19.839 0 0 0 6.002-3.03a.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.06.06 0 0 0-.031-.03z"/>
                </svg>
                Zaloguj przez Discord
            </button>

            <a href="index.html" class="back-link">← Wróć do strony głównej</a>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Jeśli użytkownik jest już zalogowany, prześlij go do dashboardu
            if (localStorage.getItem('cgl_user')) {
                window.location.href = 'dashboard.html';
            }

            // Obsługa błędów autoryzacji (jeśli wrócisz z błędem)
            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.has('error')) {
                Swal.fire({
                    title: 'Błąd logowania',
                    text: 'Nie udało się autoryzować konta Discord.',
                    icon: 'error',
                    background: '#1a1a1a',
                    color: '#fff'
                });
            }
        });

        function authDiscord() {
            // TWOJE DANE KLIENTA
            const clientID = "1483983829919076432";
            const redirect = encodeURIComponent("http://127.0.0.1:5500/index.html");
            
            // Przekierowanie do Discorda
            window.location.href = `https://discord.com/oauth2/authorize?client_id=${clientID}&response_type=token&redirect_uri=${redirect}&scope=identify`;
        }
    </script>
</body>
</html>
